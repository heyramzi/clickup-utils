name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. clickup-utils-v1.0.0 or cli-v0.8.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-lib:
    if: |
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'clickup-utils-v')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'clickup-utils-v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@heyramzi"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-cli:
    if: |
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'cli-v')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'cli-v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@clickup-utils"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @clickup-utils/cli run build
      - run: pnpm --filter @clickup-utils/cli publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
